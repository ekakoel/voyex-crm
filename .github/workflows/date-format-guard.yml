name: Date Format Guard

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
      - master

jobs:
  date-format-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ripgrep
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ripgrep
          fi

      - name: Run date format guard
        run: bash scripts/ci/check-date-format.sh
